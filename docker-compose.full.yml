# Full stack example: Uptime Kuma 2.x + the V2 API together.
# The API reaches Kuma via the service name on the internal network.
services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    volumes:
      - uptime-kuma-data:/app/data
    restart: unless-stopped
    # expose the Kuma UI if you want it:
    # ports: ["3001:3001"]

  uptime-kuma-v2-api:
    image: ghcr.io/paul-hph/uptime-kuma-v2-api:latest
    pull_policy: always
    depends_on:
      - uptime-kuma
    environment:
      KUMA_SERVER: "http://uptime-kuma:3001"
      KUMA_USERNAME: "${KUMA_USERNAME:?set KUMA_USERNAME}"
      KUMA_PASSWORD: "${KUMA_PASSWORD:?set KUMA_PASSWORD}"
      API_KEYS: "${API_KEYS:?set API_KEYS}"
      RATE_LIMIT: "${RATE_LIMIT:-120/minute}"
      FORWARDED_ALLOW_IPS: "${FORWARDED_ALLOW_IPS:-127.0.0.1}"
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  uptime-kuma-data:
